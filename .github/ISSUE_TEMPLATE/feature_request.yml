name: 功能建议
description: 建议新功能或改进
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出功能建议！请填写以下表单。

  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 清晰描述你遇到的问题或限制。
      placeholder: 我在...时总是遇到...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 描述你期望的解决方案。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 其他方案
      description: 描述你考虑过的其他解决方案或功能。

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他与功能建议相关的上下文或截图。
